# This configuration file defines the docker compose workflow or settings.
x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  APP_MASTER_KEY: ${APP_MASTER_KEY:?APP_MASTER_KEY is required}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
  WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
  AGENT_INSTALL_ENABLED: ${AGENT_INSTALL_ENABLED:-false}
  AGENT_BINARY_STORE_ROOT: ${AGENT_BINARY_STORE_ROOT:-/opt/homelab-agent-binaries}
  AGENT_BINARY_DEFAULT_VERSION: ${AGENT_BINARY_DEFAULT_VERSION:-v0.2.0}
  AGENT_INSTALL_QUEUE_NAME: ${AGENT_INSTALL_QUEUE_NAME:-agent-install-jobs}
  AGENT_INSTALL_SECRET_TTL_SEC: ${AGENT_INSTALL_SECRET_TTL_SEC:-900}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_TO_STDOUT: ${LOG_TO_STDOUT:-true}
  LOG_TO_FILE: ${LOG_TO_FILE:-true}
  LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
  LOG_MAX_BYTES_PER_SERVICE: ${LOG_MAX_BYTES_PER_SERVICE:-1073741824}
  LOG_ROTATE_FILE_SIZE_BYTES: ${LOG_ROTATE_FILE_SIZE_BYTES:-52428800}

services:
  postgres:
    image: postgres:16-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: homelab
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: homelab-redis
    restart: unless-stopped
    ports:
      - '56379:6379'

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      args:
        AGENT_BINARY_DEFAULT_VERSION: ${AGENT_BINARY_DEFAULT_VERSION:-v0.2.0}
    container_name: homelab-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      <<: *common-env
      PORT: 4000
      API_LOG_LEVEL: ${API_LOG_LEVEL:-}
      API_LOG_FILE_PATH: ${API_LOG_FILE_PATH:-/var/log/homelab/api/api.log}
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_LIMIT: 120
      AI_RETENTION_DAYS: 30
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
      DISCOVERY_AI_ENABLED: ${DISCOVERY_AI_ENABLED:-true}
      DISCOVERY_INTERVAL_SEC: ${DISCOVERY_INTERVAL_SEC:-600}
      DISCOVERY_AI_CATALOG_TTL_SEC: ${DISCOVERY_AI_CATALOG_TTL_SEC:-86400}
      DISCOVERY_MAX_HOSTS_PER_RUN: ${DISCOVERY_MAX_HOSTS_PER_RUN:-120}
      DISCOVERY_MAX_PROBES_PER_HOST: ${DISCOVERY_MAX_PROBES_PER_HOST:-12}
      DISCOVERY_AUTO_UPSERT: ${DISCOVERY_AUTO_UPSERT:-true}
      DISCOVERY_CONFIDENCE_THRESHOLD: ${DISCOVERY_CONFIDENCE_THRESHOLD:-0.75}
      DISCOVERY_SUBNET_ENABLED: ${DISCOVERY_SUBNET_ENABLED:-false}
      DISCOVERY_SUBNET_SCHEDULED: ${DISCOVERY_SUBNET_SCHEDULED:-false}
      DISCOVERY_SUBNET_SCHEDULED_WRITE_APPROVED: ${DISCOVERY_SUBNET_SCHEDULED_WRITE_APPROVED:-false}
      DISCOVERY_SUBNET_DEFAULT_CIDRS: ${DISCOVERY_SUBNET_DEFAULT_CIDRS:-10.0.0.0/24,172.16.0.0/24,192.168.1.0/24}
      DISCOVERY_SUBNET_MAX_HOSTS: ${DISCOVERY_SUBNET_MAX_HOSTS:-512}
      DISCOVERY_SUBNET_CONCURRENCY: ${DISCOVERY_SUBNET_CONCURRENCY:-24}
      DISCOVERY_SUBNET_CONNECT_TIMEOUT_MS: ${DISCOVERY_SUBNET_CONNECT_TIMEOUT_MS:-750}
      DISCOVERY_SUBNET_MCP_TOOL_TIMEOUT_MS: ${DISCOVERY_SUBNET_MCP_TOOL_TIMEOUT_MS:-120000}
    ports:
      - '4000:4000'
    volumes:
      - ${HOST_LOG_ROOT:-./logs}/api:/var/log/homelab/api
    command: >
      sh -lc "pnpm --filter @homelab/api prisma:generate &&
              pnpm --filter @homelab/api prisma:drop-email-routes &&
              pnpm --filter @homelab/api prisma:push &&
              pnpm --filter @homelab/api dev"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: homelab-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - api
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      APP_MASTER_KEY: ${APP_MASTER_KEY:?APP_MASTER_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-}
      LOG_TO_STDOUT: ${LOG_TO_STDOUT:-true}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      LOG_MAX_BYTES_PER_SERVICE: ${LOG_MAX_BYTES_PER_SERVICE:-1073741824}
      LOG_ROTATE_FILE_SIZE_BYTES: ${LOG_ROTATE_FILE_SIZE_BYTES:-52428800}
      WORKER_LOG_FILE_PATH: ${WORKER_LOG_FILE_PATH:-/var/log/homelab/worker/worker.log}
    volumes:
      - ${HOST_LOG_ROOT:-./logs}/worker:/var/log/homelab/worker
    command: sh -lc "pnpm --filter @homelab/worker dev"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: homelab-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_LOG_LEVEL: ${WEB_LOG_LEVEL:-}
      LOG_TO_STDOUT: ${LOG_TO_STDOUT:-true}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      LOG_MAX_BYTES_PER_SERVICE: ${LOG_MAX_BYTES_PER_SERVICE:-1073741824}
      LOG_ROTATE_FILE_SIZE_BYTES: ${LOG_ROTATE_FILE_SIZE_BYTES:-52428800}
      WEB_LOG_FILE_PATH: ${WEB_LOG_FILE_PATH:-/var/log/homelab/web/web.log}
    ports:
      - '5173:5173'
    volumes:
      - ${HOST_LOG_ROOT:-./logs}/web:/var/log/homelab/web
    command: sh -lc "pnpm --filter @homelab/web dev:logged"

volumes:
  postgres_data:
